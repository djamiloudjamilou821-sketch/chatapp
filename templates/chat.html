<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b141a;
            color: white;
        }

        .header {
            background: #202c33;
            padding: 12px;
            text-align: center;
        }

        #online {
            font-size: 12px;
            color: #25d366;
        }

        #typing {
            font-size: 12px;
            text-align: center;
            color: gray;
        }

        .chat {
            height: 75vh;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            max-width: 70%;
            padding: 10px;
            margin: 5px;
            border-radius: 12px;
            font-size: 14px;
        }

        .me {
            background: #005c4b;
            align-self: flex-end;
        }

        .other {
            background: #202c33;
            align-self: flex-start;
        }

        .input {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            background: #202c33;
            padding: 8px;
        }

        .input input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
        }

        .input button {
            margin-left: 8px;
            background: #25d366;
            border: none;
            padding: 10px;
            border-radius: 50%;
        }

        img.chat-img {
            max-width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    💬 {{ user }}
    <div id="online">🟢 Online</div>
</div>

<div id="typing"></div>

<div id="chat" class="chat">

    {% for m in messages %}

        {% if m[1] == session['user'] %}
            <div class="msg me">
                {{ m[3] }}

                {% if m[4] %}
                    <br><img src="/static/uploads/{{ m[4] }}" class="chat-img">
                {% endif %}
            </div>
        {% else %}
            <div class="msg other">
                <b>{{ m[1] }}</b><br>
                {{ m[3] }}

                {% if m[4] %}
                    <br><img src="/static/uploads/{{ m[4] }}" class="chat-img">
                {% endif %}
            </div>
        {% endif %}

    {% endfor %}

</div>

<form class="input" method="POST" enctype="multipart/form-data">
    <input name="message" placeholder="Message">
    <input type="file" name="image">
    <button>➤</button>
</form>

<script>
var socket = io();

socket.emit("user_online", {
    username: "{{ session['user'] }}"
});

/* typing */
document.querySelector("input[name='message']").addEventListener("input", function () {
    socket.emit("typing", { sender: "{{ session['user'] }}" });

    setTimeout(() => {
        socket.emit("stop_typing", {});
    }, 1000);
});

socket.on("typing", function (data) {
    document.getElementById("typing").innerHTML =
        "✍ " + data.sender + " is typing...";
});

socket.on("stop_typing", function () {
    document.getElementById("typing").innerHTML = "";
});

/* messages */
socket.on("receive_message", function (data) {
    location.reload(); // SAFE VERSION (no crash, stable)
});
</script>

</body>
</html>
